<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../CSSs/product.css">
    <link rel="stylesheet" href="../CSSs/navbar.css">
    <link rel="stylesheet" href="../CSSs/product-navbar.css">
    <link rel='stylesheet'
        href='https://cdn-uicons.flaticon.com/4.0.0/uicons-regular-rounded/css/uicons-regular-rounded.css'>


    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>Products</title>
</head>

<body>
    <div id="navbar-root"></div>


    <main>



        <div class="shop-container">

            <!-- Filters -->
            <aside class="filters">
                <h2>Filters</h2>
                <hr color=" #DDC57A">
                <h3>Category</h3>
                <button class="filter-btn" data-category="all">All</button>
                <button class="filter-btn" data-category="Food & Drink">Food</button>
                <button class="filter-btn" data-category="Fashion">Fashion</button>
                <button class="filter-btn" data-category="Beauty & Health">Beauty & Health</button>
                <button class="filter-btn" data-category="Footwear">Footwear</button>
                <button class="filter-btn" data-category="Homeware">Homeware</button>

            </aside>




            <!-- Products -->
            <section class="products-section">


                <div class="products-header">
                    <h1>Featured Collection</h1>
                </div>

                <div id="products" class="products"></div>
                <div id="pagination" class="pagination"></div>
            </section>

        </div>

    </main>
    <script src="../SCRIPTs/navbar.js"></script>
    <script src="../SCRIPTs/product-navbar.js"></script>
    <script src="../SCRIPTs/whishlist.js"></script>
    <script src="../SCRIPTs/product.js"></script>

</body>

</html>
