<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wishlist</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <script src="https://kit.fontawesome.com/f5c5bb3eb1.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="../CSSs/whishlistPage.css">
    <link rel="stylesheet" href="../CSSs/navbar.css">
    <link rel='stylesheet'
        href='https://cdn-uicons.flaticon.com/4.0.0/uicons-regular-rounded/css/uicons-regular-rounded.css'>
</head>

<body>
    <div id="navbar-root"></div>

    <main>
        <section class="wishlist-section">
            <div class="wishlist-head-top">
                <div class="breadcrumb">
                    <a href="index.html">Home</a>
                    <span>></span>
                    <span class="current">Wishlist</span>
                </div>
            </div>

            <div class="wishlist-head-main">
                <div>
                    <h1>Your Wishlist</h1>
                    <p>Manage your saved pieces and curated selections.</p>
                </div>
                <div class="head-actions">
                    <div class="saved-count"><span id="saved_count">0</span> Items Saved</div>
                    <button class="move-all-btn" id="move_all_btn" type="button">MOVE ALL TO CART</button>
                </div>
            </div>

            <div class="wishlist-grid" id="wishlist_grid"></div>
            <p class="empty-message" id="empty_message">Your wishlist is empty.</p>
        </section>
    </main>

    <script src="../SCRIPTs/navbar.js"></script>
    <script src="../SCRIPTs/whishlistPage.js"></script>
</body>

</html>
