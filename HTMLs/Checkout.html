<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - KEMET</title>
    <link rel="stylesheet" href="../CSSs/checkout.css">
    <link rel="stylesheet" href="../CSSs/navbar.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel='stylesheet'
        href='https://cdn-uicons.flaticon.com/4.0.0/uicons-regular-rounded/css/uicons-regular-rounded.css'>
</head>

<body>
    <div id="navbar-root"></div>

    <div class="page-container">

        <main class="main-content">
            <nav class="breadcrumb">
                <a href="#">Home</a>
                <i class="fa-solid fa-chevron-right breadcrumb-separator"></i>
                <a href="#">Cart</a>
                <i class="fa-solid fa-chevron-right breadcrumb-separator"></i>
                <span class="current">Checkout</span>
            </nav>

            <h1 class="page-title">Checkout</h1>

            <div class="checkout-grid">
                <div class="checkout-left">
                    <section class="checkout-section">
                        <div class="section-header">
                            <span class="step-number">1</span>
                            <h2>Shipping Information</h2>
                        </div>
                        <form class="shipping-form" action="#" method="POST" autocomplete="on">
                            <div class="form-group full-width">
                                <label for="fullName">Full Name</label>
                                <input type="text" id="fullName" name="fullName" placeholder="John Doe" required>
                            </div>
                            <div class="form-group">
                                <label for="phone">Phone Number</label>
                                <input type="tel" id="phone" name="phone" placeholder="+20 123 456 7890" required>
                            </div>
                            <div class="form-group">
                                <label for="email">Email Address</label>
                                <input type="email" id="email" name="email" placeholder="john@example.com" required>
                            </div>
                            <div class="form-group full-width">
                                <label for="address">Delivery Address</label>
                                <input type="text" id="address" name="address"
                                    placeholder="Street name, building number, apartment" required>
                            </div>
                            <div class="form-group">
                                <label for="city">City</label>
                                <select id="city" name="city" required>
                                    <option value="cairo">Cairo</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="postalCode">Postal Code (Optional)</label>
                                <input type="text" id="postalCode" name="postalCode" placeholder="12345">
                            </div>
                        </form>
                    </section>

                    <section class="checkout-section">
                        <div class="section-header">
                            <span class="step-number">2</span>
                            <h2>Payment Method</h2>
                        </div>
                        <div class="payment-methods">
                            <label class="payment-method-card active">
                                <input type="radio" name="paymentMethod" value="card" checked>
                                <div class="payment-card-header">
                                    <i class="fa-regular fa-credit-card payment-icon"></i>
                                    <span class="custom-radio"></span>
                                </div>
                                <div class="payment-text">
                                    <span class="payment-title">Credit / Debit Card</span>
                                    <span class="payment-desc">Visa, Mastercard, Meeza</span>
                                </div>
                            </label>

                            <label class="payment-method-card">
                                <input type="radio" name="paymentMethod" value="cod">
                                <div class="payment-card-header">
                                    <i class="fa-solid fa-money-bill-wave payment-icon"
                                        style="color: var(--text-light);"></i>
                                    <span class="custom-radio"></span>
                                </div>
                                <div class="payment-text">
                                    <span class="payment-title">Cash on Delivery</span>
                                    <span class="payment-desc">Pay when your order arrives</span>
                                </div>
                            </label>
                        </div>

                        <div class="credit-card-container">
                            <div class="credit-card-form">
                                <div class="form-group full-width">
                                    <label for="cardNumber">CARD NUMBER</label>
                                    <input type="text" id="cardNumber" name="cardNumber"
                                        placeholder="0000 0000 0000 0000">
                                </div>
                                <div class="form-group">
                                    <label for="expiryDate">EXPIRY DATE</label>
                                    <input type="text" id="expiryDate" name="expiryDate" placeholder="MM/YY">
                                </div>
                                <div class="form-group">
                                    <label for="cvc">CVC</label>
                                    <input type="text" id="cvc" name="cvc" placeholder="123">
                                </div>
                            </div>
                        </div>
                    </section>
                </div>

                <div class="checkout-right">
                    <aside class="order-summary">
                        <h2>Order Summary</h2>
                        <div class="order-items" id="orderItems"></div>

                        <div class="promo-code">
                            <input type="text" placeholder="Promo code">
                            <button type="button">Apply</button>
                        </div>

                        <div class="price-breakdown"></div>

                        <div class="price-total"></div>

                        <button class="complete-purchase-btn" type="submit">
                            <i class="fa-solid fa-lock" style="font-size: 0.9em;"></i> Complete Purchase
                        </button>
                        <p class="secure-checkout">
                            <i class="fa-solid fa-shield-halved"></i> Secure checkout powered by Stripe
                        </p>
                    </aside>
                </div>
            </div>
        </main>

        <footer class="footer">
            <div class="footer-left">
                <div class="footer-logo">KEMET</div>
                <p>&copy; 2024 KEMET. Egyptian Craftsmanship.</p>
            </div>
            <div class="footer-links">
                <a href="#">Privacy Policy</a>
                <a href="#">Terms of Service</a>
                <a href="#">Contact Us</a>
            </div>
        </footer>
    </div>
    <script src="../SCRIPTs/navbar.js"></script>
    <script src="../SCRIPTs/checkout.js"></script>
</body>

</html>
