<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Confirmed - KEMET</title>
    <link rel="stylesheet" href="../CSSs/checkout.css">
    <link rel="stylesheet" href="../CSSs/navbar.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel='stylesheet'
        href='https://cdn-uicons.flaticon.com/4.0.0/uicons-regular-rounded/css/uicons-regular-rounded.css'>
    <style>
        .success-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 60vh;
            text-align: center;
            padding: 60px 20px;
        }

        .success-icon {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background-color: #e8f5e9;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 24px;
        }

        .success-icon i {
            font-size: 42px;
            color: #2e7d32;
        }

        .success-wrapper h1 {
            font-size: 28px;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 12px;
        }

        .success-wrapper p {
            font-size: 16px;
            color: #666;
            max-width: 420px;
            line-height: 1.6;
            margin-bottom: 8px;
        }

        .order-id-label {
            font-size: 14px;
            color: #999;
            margin-bottom: 32px;
        }

        .order-id-label span {
            font-weight: 600;
            color: #c49a45;
        }

        .success-actions {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn-primary {
            background-color: #c49a45;
            color: #fff;
            border: none;
            padding: 14px 32px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.2s;
        }

        .btn-primary:hover {
            background-color: #a87e35;
        }

        .btn-secondary {
            background-color: transparent;
            color: #c49a45;
            border: 2px solid #c49a45;
            padding: 14px 32px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s;
        }

        .btn-secondary:hover {
            background-color: #c49a45;
            color: #fff;
        }
    </style>
</head>

<body>
    <div id="navbar-root"></div>

    <div class="page-container">
        <main class="main-content">
            <div class="success-wrapper">
                <div class="success-icon">
                    <i class="fa-solid fa-check"></i>
                </div>
                <h1>Order Confirmed!</h1>
                <p>Thank you for shopping with <strong>KEMET</strong>. Your order has been placed successfully.</p>
                <p class="order-id-label">Order ID: <span id="orderIdDisplay">—</span></p>
                <div class="success-actions">
                    <a href="index.html" class="btn-primary">Continue Shopping</a>
                    <a href="Cart.html" class="btn-secondary">View Cart</a>
                </div>
            </div>
        </main>
    </div>

    <script src="../SCRIPTs/navbar.js"></script>
    <script>
        // Show the latest order ID from localStorage
        const orders = JSON.parse(localStorage.getItem('Orders') || '[]');
        if (orders.length > 0) {
            const latest = orders[orders.length - 1];
            document.getElementById('orderIdDisplay').textContent = latest.id;
        }
    </script>
</body>

</html>
