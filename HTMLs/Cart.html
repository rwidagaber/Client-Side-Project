<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart - Ana Masry</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../CSSs/Cart.css">
</head>
<body>

    <nav>
        <ul class="menu">
            <li class="Logo">
                <img src="../ASSESTs/555.png" alt="Logo" style="height: 45px;">
            </li>
            <li><a href="index.html">Home</a></li>
            <li><a href="Product.html">Shop</a></li>
            <li><a href="">New Arrivals</a></li>
            <li><a href="">Sale</a></li>
        </ul>

        <ul class="icons">
            <li class="search-box">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" placeholder="Search Egyptian craft..." id="searchInput">
            </li>
            <li>
                <a href="/HTMLs/whishlistPage.html" class="icon-link" target="_blank">
                    <i class="fa-solid fa-heart"></i>
                    <span id="wishlist-count">0</span>
                </a>
            </li>
            <li>
                <a href="Cart.html" class="icon-link" style="position: relative;">
                    <i class="fa-solid fa-bag-shopping"></i>
                    </a>
            </li>
        </ul>
    </nav>

    <section class="cart-section">
        <h1 class="page-title">Shopping Cart</h1>
        <div class="cart-container">
            <div class="cart-items-side">
                <table class="cart-table">
                    <thead>
                        <tr>
                            <th>PRODUCT</th>
                            <th>PRICE</th>
                            <th>QUANTITY</th>
                            <th>SUBTOTAL</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody id="cart-items-body"></tbody>
                </table>
                <div class="cart-footer">
                    <a href="./index.html" class="continue-btn">← Continue Shopping</a>
                    <button class="update-btn" onclick="renderCart()">↻ Update Cart</button>
                </div>
            </div>

            <div class="order-summary">
                <h3>Order Summary</h3>
                <div class="summary-details">
                    <div class="summary-row">
                        <span>Subtotal</span>
                        <span id="subtotal-val">0.00 EGP</span>
                    </div>
                    <div class="summary-row">
                        <span>Shipping</span>
                        <span class="gold-text">Free Shipping</span>
                    </div>
                    <div class="summary-total">
                        <span>Total</span>
                        <span id="total-val">0.00 EGP</span>
                    </div>
                </div>
                <button class="checkout-btn">Checkout Now</button>
            </div>
        </div>
    </section>

    <script src="../SCRIPTs/Cart.js"></script>
</body>
</html>
