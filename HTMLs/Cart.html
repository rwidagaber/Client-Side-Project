<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart - Ana Masry</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Playfair+Display:wght@700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../CSSs/Cart.css">
    <link rel="stylesheet" href="../CSSs/navbar.css">
    <!-- <link rel="stylesheet" href="/CSSs/home-page.css"> -->
    <link rel='stylesheet'
        href='https://cdn-uicons.flaticon.com/4.0.0/uicons-regular-rounded/css/uicons-regular-rounded.css'>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

</head>

<body>

    <div id="navbar-root"></div>

    <section class="cart-section">
        <h1 class="page-title">Shopping Cart</h1>
        <div class="cart-container">
            <div class="cart-items-side">
                <table class="cart-table">
                    <thead>
                        <tr>
                            <th>PRODUCT</th>
                            <th>PRICE</th>
                            <th>QUANTITY</th>
                            <th>SUBTOTAL</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody id="cart-items-body"></tbody>
                </table>
                <div class="cart-footer">
                    <a href="./Product.html" class="continue-btn">← Continue Shopping</a>
                    <button class="update-btn" onclick="renderCart()">↻ Update Cart</button>
                </div>
            </div>

            <div class="order-summary">
                <h3>Order Summary</h3>
                <div class="summary-details">
                    <div class="summary-row">
                        <span>Subtotal</span>
                        <span id="subtotal-val">0.00 EGP</span>
                    </div>
                    <div class="summary-row">
                        <span>Shipping</span>
                        <span class="gold-text">Free Shipping</span>
                    </div>
                    <div class="summary-total">
                        <span>Total</span>
                        <span id="total-val">0.00 EGP</span>
                    </div>
                </div>
                <button class="checkout-btn">Checkout Now</button>
                <p id="cart-stock-notice" class="cart-stock-notice" style="display:none;"></p>
            </div>
        </div>
    </section>

    <script src="../SCRIPTs/navbar.js"></script>
    <script src="../SCRIPTs/Cart.js"></script>
</body>

</html>
